<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="80" fill="#0a0518"/>
  <!-- Purple gradient overlay -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Gold ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.4"/>
  <!-- Cross vertical bar -->
  <rect x="228" y="80" width="56" height="352" rx="22" fill="url(#cross)"/>
  <!-- Cross horizontal bar -->
  <rect x="100" y="190" width="312" height="56" rx="22" fill="url(#cross)"/>
  <!-- Glow dot at top -->
  <circle cx="256" cy="60" r="12" fill="#f0d484" opacity="0.8"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0720"/>
      <stop offset="50%" stop-color="#2c0a5e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d2e6e" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8a951"/>
      <stop offset="100%" stop-color="#f0d484"/>
    </linearGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0d484"/>
      <stop offset="100%" stop-color="#c8a951"/>
    </linearGradient>
  </defs>
</svg>
